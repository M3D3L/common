name: Build and Deploy Sites
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  POCKETBASE_URL: ${{ vars.POCKETBASE_URL }}
  WHATSAPP_NUMBER: ${{ vars.WHATSAPP_NUMBER }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      guillermomedel: ${{ steps.filter.outputs.guillermomedel }}
      relocatetosancarlos: ${{ steps.filter.outputs.relocatetosancarlos }}
      vivirensancarlos: ${{ steps.filter.outputs.vivirensancarlos }}
      common: ${{ steps.filter.outputs.common }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            common:
              - 'app.vue'
              - 'nuxt.config.ts'
              - 'tailwind.config.js'
              - 'tsconfig.json'
              - 'components.json'
              - 'assets/**'
              - 'components/**'
              - 'composables/**'
              - 'layouts/**'
              - 'lib/**'
              - 'pages/**'
              - 'public/**'
              - 'server/**'
              - 'store/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            guillermomedel:
              - 'sites/guillermomedel.com/**'
            relocatetosancarlos:
              - 'sites/relocatetosancarlos.com/**'
            vivirensancarlos:
              - 'sites/vivirensancarlos.com/**'

  build-and-deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: guillermomedel
            domain: guillermomedel.com
            repo: M3D3L/guillermomedel.com
            path: ./sites/guillermomedel.com
          - site: relocatetosancarlos
            domain: relocatetosancarlos.com
            repo: M3D3L/relocatetosancarlos.com
            path: ./sites/relocatetosancarlos.com
          - site: vivirensancarlos
            domain: vivirensancarlos.com
            repo: M3D3L/vivirensancarlos.com
            path: ./sites/vivirensancarlos.com

    steps:
      - name: Determine if build is needed
        id: check
        run: |
          COMMON="${{ needs.detect-changes.outputs.common }}"
          SITE="${{ needs.detect-changes.outputs[matrix.site] }}"
          RELOCATE="${{ needs.detect-changes.outputs.relocatetosancarlos }}"
          VIVIR="${{ needs.detect-changes.outputs.vivirensancarlos }}"
          DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"

          SHOULD_BUILD=false

          # Always build on manual dispatch or common changes
          if [ "$DISPATCH" = "true" ] || [ "$COMMON" = "true" ]; then
            SHOULD_BUILD=true
          fi

          # Build if this specific site changed
          if [ "$SITE" = "true" ]; then
            SHOULD_BUILD=true
          fi

          # relocate and vivir are the same site in different languages â€” build both if either changes
          if [ "${{ matrix.site }}" = "vivirensancarlos" ] && [ "$RELOCATE" = "true" ]; then
            SHOULD_BUILD=true
          fi
          if [ "${{ matrix.site }}" = "relocatetosancarlos" ] && [ "$VIVIR" = "true" ]; then
            SHOULD_BUILD=true
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "Site: ${{ matrix.site }} | common=$COMMON site=$SITE dispatch=$DISPATCH â†’ build=$SHOULD_BUILD"

      - uses: actions/checkout@v4
        if: steps.check.outputs.should_build == 'true'
        with:
          lfs: true

      - name: Setup Node
        if: steps.check.outputs.should_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: "./package-lock.json"

      - name: Cache node_modules
        if: steps.check.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-v2-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies
        if: steps.check.outputs.should_build == 'true'
        run: npm ci

      - name: Prepare Base Site (Dependency)
        if: steps.check.outputs.should_build == 'true' && matrix.site == 'vivirensancarlos'
        run: npx nuxi prepare sites/relocatetosancarlos.com

      - name: Build ${{ matrix.domain }}
        if: steps.check.outputs.should_build == 'true'
        run: |
          npx nuxi prepare
          npm run generate
        working-directory: ${{ matrix.path }}
        env:
          POCKETBASE_URL: ${{ env.POCKETBASE_URL }}
          WHATSAPP_NUMBER: ${{ env.WHATSAPP_NUMBER }}

      - name: Deploy ${{ matrix.domain }}
        if: steps.check.outputs.should_build == 'true'
        run: |
          SITE_PATH="${{ matrix.path }}"
          if [ -d "$SITE_PATH/.output/public" ]; then
            BUILD_OUTPUT="$SITE_PATH/.output/public"
          elif [ -d "$SITE_PATH/dist" ]; then
            BUILD_OUTPUT="$SITE_PATH/dist"
          else
            BUILD_OUTPUT="$SITE_PATH/build"
          fi
          mkdir -p deploy
          cp -a "$BUILD_OUTPUT"/. deploy/
          echo "${{ matrix.domain }}" > deploy/CNAME

      - name: Push to GitHub Pages
        if: steps.check.outputs.should_build == 'true'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: ${{ matrix.repo }}
          branch: gh-pages
          folder: deploy
          clean: true
          token: ${{ secrets.DEPLOY_TOKEN }}
